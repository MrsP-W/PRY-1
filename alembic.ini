# Alembic 配置（D3.2）
#
# 路径：项目根目录（与 pyproject.toml 同级）
# 关键：
#   - script_location = src/my_ai_employee/core/migrations
#   - sqlalchemy.url 用占位（"sqlite:///"），真实连接由 env.py 的 creator 接管
#   - 不需要 sqlalchemy.url 写真实路径（避免泄漏 DB 路径到 ini）

[alembic]
script_location = src/my_ai_employee/core/migrations
prepend_sys_path = src
# sqlalchemy.url 是占位（env.py creator 走 SQLCipher Database.open()）
sqlalchemy.url = sqlite:///

# 模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC

# 日志
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
